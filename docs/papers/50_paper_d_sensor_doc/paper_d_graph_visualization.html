<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper D — Sensor-Document Knowledge Graph</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080c14;
    color: #e2e8f0;
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden;
    height: 100vh;
  }

  #container {
    width: 100vw;
    height: 100vh;
    position: relative;
  }

  canvas { display: block; }

  /* Legend */
  .legend {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(10, 14, 23, 0.92);
    border: 1px solid #1e293b;
    border-radius: 12px;
    padding: 18px 22px;
    z-index: 10;
    backdrop-filter: blur(8px);
  }

  .legend h3 {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 14px;
    color: #94a3b8;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 13px;
  }

  .legend-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Info panel */
  .info-panel {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 340px;
    background: rgba(10, 14, 23, 0.95);
    border: 1px solid #1e293b;
    border-radius: 12px;
    padding: 22px;
    z-index: 10;
    backdrop-filter: blur(8px);
    display: none;
  }

  .info-panel.visible { display: block; }

  .info-panel h2 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .info-panel .type-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 12px;
  }

  .info-panel .detail {
    font-size: 12px;
    color: #94a3b8;
    line-height: 1.8;
    margin-top: 8px;
  }

  .info-panel .connections {
    margin-top: 12px;
    font-size: 12px;
  }

  .info-panel .conn-item {
    padding: 4px 0;
    border-bottom: 1px solid #1e293b;
    cursor: pointer;
    transition: color 0.2s;
  }

  .info-panel .conn-item:hover { color: #38bdf8; }

  /* Controls */
  .controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 10;
  }

  .ctrl-btn {
    background: rgba(10, 14, 23, 0.9);
    border: 1px solid #1e293b;
    border-radius: 8px;
    padding: 8px 16px;
    color: #94a3b8;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: all 0.2s;
  }

  .ctrl-btn:hover { border-color: #38bdf8; color: #38bdf8; }
  .ctrl-btn.active { background: rgba(56, 189, 248, 0.1); border-color: #38bdf8; color: #38bdf8; }

  /* Title */
  .title-bar {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
  }

  .title-bar h1 {
    font-size: 15px;
    font-weight: 700;
    color: #e2e8f0;
  }

  .title-bar .sub {
    font-size: 11px;
    color: #64748b;
    font-family: 'JetBrains Mono', monospace;
    margin-top: 4px;
  }

  /* Stats */
  .stats {
    position: fixed;
    bottom: 20px;
    right: 20px;
    font-size: 11px;
    color: #475569;
    font-family: 'JetBrains Mono', monospace;
    z-index: 10;
    text-align: right;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="title-bar">
  <h1>Paper D — Sensor-Document Knowledge Graph</h1>
  <div class="sub">SUPRA Vplus | 14,052 docs scanned | drag to move, scroll to zoom</div>
</div>

<div class="legend">
  <h3>Node Types</h3>
  <div class="legend-item"><div class="legend-dot" style="background:#38bdf8;"></div> Sensor</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f472b6;"></div> Failure Mode</div>
  <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div> Document (myservice)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a78bfa;"></div> Document (gcb)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fbbf24;"></div> Action</div>
</div>

<div class="info-panel" id="infoPanel">
  <h2 id="infoName"></h2>
  <div class="type-tag" id="infoTag"></div>
  <div class="detail" id="infoDetail"></div>
  <div class="connections" id="infoConns"></div>
</div>

<div class="controls">
  <button class="ctrl-btn active" onclick="setFilter('all')">All</button>
  <button class="ctrl-btn" onclick="setFilter('APC')">APC</button>
  <button class="ctrl-btn" onclick="setFilter('Temp')">Temp</button>
  <button class="ctrl-btn" onclick="setFilter('Gas')">Gas/MFC</button>
  <button class="ctrl-btn" onclick="setFilter('EPD')">EPD</button>
  <button class="ctrl-btn" onclick="setFilter('RF')">RF Power</button>
</div>

<div class="stats" id="stats"></div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// === DATA ===
const COLORS = {
  sensor: '#38bdf8',
  failure: '#f472b6',
  doc_myservice: '#34d399',
  doc_gcb: '#a78bfa',
  action: '#fbbf24',
  edge: 'rgba(255,255,255,0.06)',
  edgeHighlight: 'rgba(56,189,248,0.3)',
};

// Build graph from real data
const nodes = [];
const edges = [];
const nodeMap = {};

function addNode(id, type, label, group, detail, size) {
  if (nodeMap[id]) return nodeMap[id];
  const n = {
    id, type, label, group, detail,
    x: W/2 + (Math.random()-0.5)*300,
    y: H/2 + (Math.random()-0.5)*250,
    vx: 0, vy: 0,
    size: size || 6,
    visible: true,
    highlighted: false,
  };
  nodes.push(n);
  nodeMap[id] = n;
  return n;
}

function addEdge(src, tgt, label) {
  if (!nodeMap[src] || !nodeMap[tgt]) return;
  edges.push({ source: nodeMap[src], target: nodeMap[tgt], label: label || '', visible: true });
}

// --- Sensors ---
const sensors = [
  { id: 's_apc_pos', label: 'APC_Position', group: 'APC', docs: 23, detail: 'APC valve position sensor. 23 related docs found.' },
  { id: 's_apc_prs', label: 'APC_Pressure', group: 'APC', docs: 66, detail: 'APC pressure sensor. 66 related docs found.' },
  { id: 's_apc_sp', label: 'APC_SetPoint', group: 'APC', docs: 35, detail: 'APC pressure setpoint. 35 related docs found.' },
  { id: 's_temp1', label: 'Temp1', group: 'Temp', docs: 57, detail: 'Heater chuck temperature 1. 57 related docs found.' },
  { id: 's_temp2', label: 'Temp2', group: 'Temp', docs: 227, detail: 'Heater chuck temperature 2. 227 related docs found.' },
  { id: 's_epd', label: 'EPD_Monitor', group: 'EPD', docs: 10, detail: 'Endpoint detection monitor. 10 related docs found.' },
  { id: 's_gas_mfc', label: 'Gas/MFC', group: 'Gas', docs: 573, detail: 'MFC gas flow sensors. 573 related docs found.' },
  { id: 's_gas_prs', label: 'Gas_Pressure', group: 'Gas', docs: 16, detail: 'Gas line pressure. 16 related docs found.' },
  { id: 's_rf_fwd', label: 'SourcePwr_Fwd', group: 'RF', docs: 208, detail: 'RF forward power. 208 related docs found.' },
  { id: 's_rf_ref', label: 'SourcePwr_Ref', group: 'RF', docs: 36, detail: 'RF reflected power. 36 related docs found.' },
  { id: 's_pressure', label: 'Pressure', group: 'APC', docs: 145, detail: 'Chamber pressure (baratron). 145 related docs found.' },
];

sensors.forEach(s => addNode(s.id, 'sensor', s.label, s.group, s.detail, Math.max(8, Math.min(22, Math.sqrt(s.docs)*1.5))));

// --- Failure Modes (from ES data) ---
const failures = [
  { id: 'f_hunting', label: 'Pressure Hunting', group: 'APC', detail: 'APC valve pressure hunting. Valve oscillation causing unstable pressure.' },
  { id: 'f_pos_drift', label: 'Position Drift', group: 'APC', detail: 'APC position gradually increasing. Trend up over time.' },
  { id: 'f_apc_fail', label: 'APC Fail', group: 'APC', detail: 'APC valve failure. Complete malfunction requiring replacement.' },
  { id: 'f_apc_damage', label: 'APC Damaged', group: 'APC', detail: 'Physical damage to APC valve or screw.' },
  { id: 'f_apc_comm', label: 'APC Comm Error', group: 'APC', detail: 'APC communication failure. Baratron cable disconnect.' },
  { id: 'f_apc_angle', label: 'APC Angle Abnormal', group: 'APC', detail: 'APC angle position abnormal causing FDC out of spec.' },
  { id: 'f_temp_diff', label: 'Temp Differential', group: 'Temp', detail: 'Temperature differential FDC out of spec. Chuck performance degradation.' },
  { id: 'f_temp_intlk', label: 'Temp Interlock', group: 'Temp', detail: 'Temperature interlock alarm triggered.' },
  { id: 'f_temp_rise', label: 'Temp Trend Rise', group: 'Temp', detail: 'Temperature max/min trend continuously rising.' },
  { id: 'f_scr_fail', label: 'SCR/Heater Fail', group: 'Temp', detail: 'SCR failure or heating jacket temperature control failure.' },
  { id: 'f_epd_bad', label: 'EPD Value Bad', group: 'EPD', detail: 'EPD monitor value out of range (level 9).' },
  { id: 'f_gas_leak', label: 'Gas Leak', group: 'Gas', detail: 'Gas line leak detected in MFC system.' },
  { id: 'f_rf_abnormal', label: 'RF Power Abnormal', group: 'RF', detail: 'Source power reading abnormal or reflected power high.' },
];

failures.forEach(f => addNode(f.id, 'failure', f.label, f.group, f.detail, 10));

// --- Documents (representative samples from ES) ---
const docs = [
  { id: 'd_40036448', label: '40036448', group: 'APC', dtype: 'myservice', detail: 'APC PRESSURE HUNTING. APC valve replaced. SOP: Global SOP_SUPRA N_REP_PM_APC VALVE' },
  { id: 'd_40146514', label: '40146514', group: 'APC', dtype: 'myservice', detail: 'APC Position trend increase. FAST purge time adjustment. APC Auto Learn/Tune performed.' },
  { id: 'd_40063372', label: '40063372', group: 'APC', dtype: 'myservice', detail: 'APC/Baratron data reading failure. PDB toggle switch off. D-net reset recovery.' },
  { id: 'd_40047332', label: '40047332', group: 'APC', dtype: 'myservice', detail: 'APC control ability declined. PM2 APC step trend up.' },
  { id: 'd_40041085', label: '40041085', group: 'APC', dtype: 'myservice', detail: 'APC angle position abnormal. Pressure FDC out of spec.' },
  { id: 'd_40117956', label: '40117956', group: 'APC', dtype: 'myservice', detail: 'APC Pressure E3 flag. Pressure difference noise. Auto learn + noise filter.' },
  { id: 'd_40042585', label: '40042585', group: 'Temp', dtype: 'myservice', detail: 'PM2 Temp1 temperature differential FDC out of spec. Heater chuck replaced.' },
  { id: 'd_40086884', label: '40086884', group: 'Temp', dtype: 'myservice', detail: 'Intermittent Temp2 interlock alarm.' },
  { id: 'd_40086313', label: '40086313', group: 'EPD', dtype: 'myservice', detail: 'PM2 CH1 EPD MONITOR value bad (level 9).' },
  { id: 'd_40029835', label: '40029835', group: 'APC', dtype: 'myservice', detail: 'APC communication failure. Baratron cable disconnected.' },
  { id: 'd_gcb_12034', label: 'GCB_12034', group: 'APC', dtype: 'gcb', detail: 'GCB document related to APC troubleshooting.' },
  { id: 'd_gcb_5260', label: 'GCB_5260', group: 'APC', dtype: 'gcb', detail: 'GCB document: APC setpoint / chamber pressure.' },
  { id: 'd_40156449', label: '40156449', group: 'Temp', dtype: 'myservice', detail: 'Temp Max Min Trend rise. TEMP CTR replaced.' },
];

docs.forEach(d => addNode(d.id, d.dtype === 'gcb' ? 'doc_gcb' : 'doc_myservice', d.label, d.group, d.detail, 8));

// --- Actions ---
const actions = [
  { id: 'a_apc_replace', label: 'APC Replacement', group: 'APC', detail: 'Replace APC valve with A-grade spare.' },
  { id: 'a_apc_autotune', label: 'APC Auto Tune', group: 'APC', detail: 'Run APC auto learn and auto tune.' },
  { id: 'a_apc_clean', label: 'Vac V/V Clean', group: 'APC', detail: 'FAST/Slow Vac V/V cleaning.' },
  { id: 'a_chuck_replace', label: 'Chuck Replace', group: 'Temp', detail: 'Replace heater chuck and perform auto tune.' },
  { id: 'a_temp_ctr_rep', label: 'Temp CTR Replace', group: 'Temp', detail: 'Replace temperature controller.' },
  { id: 'a_dnet_reset', label: 'D-net Reset', group: 'APC', detail: 'D-net communication reset.' },
];

actions.forEach(a => addNode(a.id, 'action', a.label, a.group, a.detail, 9));

// --- Edges: sensor → failure ---
addEdge('s_apc_prs', 'f_hunting', 'triggers');
addEdge('s_apc_pos', 'f_pos_drift', 'triggers');
addEdge('s_apc_pos', 'f_apc_angle', 'triggers');
addEdge('s_apc_prs', 'f_apc_fail', 'triggers');
addEdge('s_apc_pos', 'f_apc_fail', 'triggers');
addEdge('s_apc_pos', 'f_apc_damage', 'triggers');
addEdge('s_apc_prs', 'f_apc_comm', 'triggers');
addEdge('s_apc_sp', 'f_hunting', 'related');
addEdge('s_pressure', 'f_hunting', 'related');
addEdge('s_pressure', 'f_apc_fail', 'related');
addEdge('s_temp1', 'f_temp_diff', 'triggers');
addEdge('s_temp2', 'f_temp_intlk', 'triggers');
addEdge('s_temp1', 'f_temp_rise', 'triggers');
addEdge('s_temp2', 'f_temp_rise', 'triggers');
addEdge('s_temp1', 'f_scr_fail', 'related');
addEdge('s_temp2', 'f_scr_fail', 'related');
addEdge('s_epd', 'f_epd_bad', 'triggers');
addEdge('s_gas_mfc', 'f_gas_leak', 'triggers');
addEdge('s_rf_fwd', 'f_rf_abnormal', 'triggers');
addEdge('s_rf_ref', 'f_rf_abnormal', 'triggers');

// --- Edges: failure → document ---
addEdge('f_hunting', 'd_40036448', 'documented');
addEdge('f_pos_drift', 'd_40146514', 'documented');
addEdge('f_apc_fail', 'd_40047332', 'documented');
addEdge('f_apc_angle', 'd_40041085', 'documented');
addEdge('f_apc_comm', 'd_40063372', 'documented');
addEdge('f_apc_comm', 'd_40029835', 'documented');
addEdge('f_hunting', 'd_40117956', 'documented');
addEdge('f_temp_diff', 'd_40042585', 'documented');
addEdge('f_temp_intlk', 'd_40086884', 'documented');
addEdge('f_epd_bad', 'd_40086313', 'documented');
addEdge('f_apc_fail', 'd_gcb_12034', 'documented');
addEdge('f_hunting', 'd_gcb_5260', 'documented');
addEdge('f_temp_rise', 'd_40156449', 'documented');

// --- Edges: failure → action ---
addEdge('f_hunting', 'a_apc_replace', 'action');
addEdge('f_pos_drift', 'a_apc_autotune', 'action');
addEdge('f_pos_drift', 'a_apc_clean', 'action');
addEdge('f_apc_fail', 'a_apc_replace', 'action');
addEdge('f_apc_damage', 'a_apc_replace', 'action');
addEdge('f_apc_comm', 'a_dnet_reset', 'action');
addEdge('f_temp_diff', 'a_chuck_replace', 'action');
addEdge('f_scr_fail', 'a_temp_ctr_rep', 'action');
addEdge('f_temp_rise', 'a_temp_ctr_rep', 'action');

// --- Edges: sensor-sensor correlation ---
addEdge('s_apc_pos', 's_apc_prs', 'correlated');
addEdge('s_apc_pos', 's_pressure', 'correlated');
addEdge('s_apc_prs', 's_apc_sp', 'correlated');
addEdge('s_apc_prs', 's_pressure', 'correlated');
addEdge('s_temp1', 's_temp2', 'correlated');
addEdge('s_rf_fwd', 's_rf_ref', 'correlated');
addEdge('s_gas_mfc', 's_gas_prs', 'correlated');

// === SIMULATION ===
let currentFilter = 'all';
let hoveredNode = null;
let dragNode = null;
let offsetX = 0, offsetY = 0;
let zoom = 1;
let panX = 0, panY = 0;

function setFilter(group) {
  currentFilter = group;
  document.querySelectorAll('.ctrl-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase().includes(group.toLowerCase()) || (group === 'all' && b.textContent === 'All'));
  });
  nodes.forEach(n => {
    n.visible = group === 'all' || n.group === group;
  });
  edges.forEach(e => {
    e.visible = e.source.visible && e.target.visible;
  });
  simStable = false;
  simCooling = 0.5;
}

let simCooling = 1.0;
let simStable = false;

function simulate() {
  if (simStable && !dragNode) return;

  const k = 0.001;
  const repulsion = 1500;
  const damping = 0.88;
  const centerForce = 0.003;
  simCooling *= 0.998;
  if (simCooling < 0.01) simCooling = 0.01;

  // Repulsion
  for (let i = 0; i < nodes.length; i++) {
    if (!nodes[i].visible) continue;
    for (let j = i+1; j < nodes.length; j++) {
      if (!nodes[j].visible) continue;
      let dx = nodes[j].x - nodes[i].x;
      let dy = nodes[j].y - nodes[i].y;
      let d2 = dx*dx + dy*dy + 1;
      let f = repulsion / d2;
      nodes[i].vx -= dx * f;
      nodes[i].vy -= dy * f;
      nodes[j].vx += dx * f;
      nodes[j].vy += dy * f;
    }
  }

  // Spring
  edges.forEach(e => {
    if (!e.visible) return;
    let dx = e.target.x - e.source.x;
    let dy = e.target.y - e.source.y;
    let d = Math.sqrt(dx*dx + dy*dy) || 1;
    let ideal = 120;
    let f = k * (d - ideal);
    let fx = dx/d * f;
    let fy = dy/d * f;
    e.source.vx += fx;
    e.source.vy += fy;
    e.target.vx -= fx;
    e.target.vy -= fy;
  });

  // Center + damping + cooling
  let totalV = 0;
  nodes.forEach(n => {
    if (!n.visible || n === dragNode) return;
    n.vx += (W/2 - n.x) * centerForce;
    n.vy += (H/2 - n.y) * centerForce;
    n.vx *= damping * simCooling;
    n.vy *= damping * simCooling;
    n.x += n.vx;
    n.y += n.vy;
    totalV += Math.abs(n.vx) + Math.abs(n.vy);
  });

  // Keep nodes inside viewport
  const pad = 80;
  nodes.forEach(n => {
    if (!n.visible) return;
    if (n.x < pad) { n.x = pad; n.vx = Math.abs(n.vx) * 0.5; }
    if (n.x > W - pad) { n.x = W - pad; n.vx = -Math.abs(n.vx) * 0.5; }
    if (n.y < pad) { n.y = pad; n.vy = Math.abs(n.vy) * 0.5; }
    if (n.y > H - pad) { n.y = H - pad; n.vy = -Math.abs(n.vy) * 0.5; }
  });

  // Stop when stable
  if (totalV < 0.5 && simCooling < 0.05) {
    simStable = true;
  }
}

function getColor(node) {
  if (node.type === 'sensor') return COLORS.sensor;
  if (node.type === 'failure') return COLORS.failure;
  if (node.type === 'doc_myservice') return COLORS.doc_myservice;
  if (node.type === 'doc_gcb') return COLORS.doc_gcb;
  if (node.type === 'action') return COLORS.action;
  return '#64748b';
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(zoom, zoom);

  // Edges
  edges.forEach(e => {
    if (!e.visible) return;
    const highlighted = hoveredNode && (e.source === hoveredNode || e.target === hoveredNode);
    ctx.beginPath();
    ctx.moveTo(e.source.x, e.source.y);
    ctx.lineTo(e.target.x, e.target.y);
    ctx.strokeStyle = highlighted ? COLORS.edgeHighlight : COLORS.edge;
    ctx.lineWidth = highlighted ? 1.5 : 0.5;
    ctx.stroke();
  });

  // Nodes
  nodes.forEach(n => {
    if (!n.visible) return;
    const isConnected = hoveredNode && edges.some(e =>
      e.visible && ((e.source === hoveredNode && e.target === n) || (e.target === hoveredNode && e.source === n))
    );
    const isHovered = n === hoveredNode;
    const dimmed = hoveredNode && !isHovered && !isConnected;

    ctx.beginPath();
    ctx.arc(n.x, n.y, n.size, 0, Math.PI*2);
    const color = getColor(n);

    if (isHovered) {
      ctx.shadowColor = color;
      ctx.shadowBlur = 20;
    }

    ctx.fillStyle = dimmed ? color + '33' : color;
    ctx.fill();
    ctx.shadowBlur = 0;

    if (isHovered) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Label — always show for visible nodes
    if (!dimmed || isHovered || isConnected) {
      ctx.fillStyle = dimmed ? '#334155' : (isHovered ? '#fff' : '#cbd5e1');
      ctx.font = `${isHovered ? '600 13' : '400 11'}px 'Noto Sans KR', sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(n.label, n.x, n.y + n.size + 14);
    }
  });

  ctx.restore();
}

function getNodeAt(mx, my) {
  const x = (mx - panX) / zoom;
  const y = (my - panY) / zoom;
  for (let i = nodes.length-1; i >= 0; i--) {
    const n = nodes[i];
    if (!n.visible) continue;
    const dx = n.x - x, dy = n.y - y;
    if (dx*dx + dy*dy < (n.size+4)*(n.size+4)) return n;
  }
  return null;
}

function showInfo(node) {
  const panel = document.getElementById('infoPanel');
  if (!node) { panel.classList.remove('visible'); return; }
  panel.classList.add('visible');
  document.getElementById('infoName').textContent = node.label;

  const tag = document.getElementById('infoTag');
  const typeLabels = { sensor: 'Sensor', failure: 'Failure Mode', doc_myservice: 'myservice', doc_gcb: 'gcb', action: 'Action' };
  tag.textContent = typeLabels[node.type] || node.type;
  tag.style.background = getColor(node) + '22';
  tag.style.color = getColor(node);

  document.getElementById('infoDetail').textContent = node.detail || '';

  const conns = edges.filter(e => e.visible && (e.source === node || e.target === node));
  const connHtml = conns.map(e => {
    const other = e.source === node ? e.target : e.source;
    return `<div class="conn-item">${e.label} &rarr; ${other.label}</div>`;
  }).join('');
  document.getElementById('infoConns').innerHTML = connHtml || '<div style="color:#475569;">No connections</div>';
}

// Events
canvas.addEventListener('mousemove', e => {
  const node = getNodeAt(e.clientX, e.clientY);
  hoveredNode = node;
  canvas.style.cursor = node ? 'pointer' : 'grab';
  if (dragNode) {
    dragNode.x = (e.clientX - panX) / zoom;
    dragNode.y = (e.clientY - panY) / zoom;
    dragNode.vx = 0;
    dragNode.vy = 0;
  }
});

canvas.addEventListener('mousedown', e => {
  const node = getNodeAt(e.clientX, e.clientY);
  if (node) {
    dragNode = node;
    simStable = false;
    simCooling = 0.3;
    showInfo(node);
  } else {
    dragNode = null;
  }
});

canvas.addEventListener('mouseup', () => { dragNode = null; });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const scale = e.deltaY > 0 ? 0.92 : 1.08;
  const mx = e.clientX, my = e.clientY;
  panX = mx - (mx - panX) * scale;
  panY = my - (my - panY) * scale;
  zoom *= scale;
  zoom = Math.max(0.3, Math.min(4, zoom));
});

// Stats
function updateStats() {
  const visNodes = nodes.filter(n => n.visible).length;
  const visEdges = edges.filter(e => e.visible).length;
  document.getElementById('stats').innerHTML =
    `nodes: ${visNodes} | edges: ${visEdges}<br>filter: ${currentFilter} | zoom: ${zoom.toFixed(1)}x`;
}

// Main loop
function loop() {
  simulate();
  draw();
  updateStats();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
