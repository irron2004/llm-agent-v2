# =============================================================================
# RAG System Docker Compose
# Local development / PoC environment
# Services: FastAPI + Elasticsearch + vLLM + Ingestion volumes
#
# Usage:
#   docker compose --profile prod up -d              # Production only
#   docker compose --profile dev up -d               # Development only
#   docker compose --profile prod --profile dev up -d # Both (different ports)
#   docker compose --profile prod --profile with-llm up -d # Prod + vLLM
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Shared Infrastructure (no profile - always running)
  # ---------------------------------------------------------------------------

  # Elasticsearch (Vector + BM25 search)
  elasticsearch:
    container_name: rag-elasticsearch
    build:
      context: ./backend/elasticsearch
      dockerfile: Dockerfile
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ${ES_DATA_PATH:?ES_DATA_PATH is required}:/usr/share/elasticsearch/data
    ports:
      - "${ES_PORT:-9200}:9200"
    networks:
      - rag_net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # MinIO (S3-compatible object storage for document images)
  minio:
    container_name: rag-minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio:/data
    networks:
      - rag_net
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  minio-init:
    container_name: rag-minio-init
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      /usr/bin/mc mb -p local/$${MINIO_BUCKET} || true
      "
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET}
    networks:
      - rag_net

  # ---------------------------------------------------------------------------
  # Optional Services (profile-based)
  # ---------------------------------------------------------------------------

  # vLLM (OpenAI compatible LLM server)
  vllm:
    container_name: rag-vllm
    image: vllm/vllm-openai:latest
    command: >
      --model ${MODEL_LLM:-${VLLM_MODEL_NAME:-gpt-oss-20b}}
      --port 8000
      --host 0.0.0.0
      --trust-remote-code
      --tensor-parallel-size ${VLLM_TP_SIZE:-2}
      --max-model-len ${VLLM_MAX_MODEL_LEN:-32768}
      --max-num-seqs ${VLLM_MAX_NUM_SEQS:-3}
      --max-num-batched-tokens ${VLLM_MAX_NUM_BATCHED_TOKENS:-8192}
      --gpu-memory-utilization ${VLLM_GPU_MEM_UTIL:-0.9}
      --no-enable-prefix-caching
    environment:
      - HF_HOME=/data/hf_cache
      - HUGGINGFACE_HUB_TOKEN=${HUGGINGFACE_HUB_TOKEN:-}
      - CUDA_VISIBLE_DEVICES=${VLLM_CUDA_DEVICES:-0,1}
    volumes:
      - /home/llm-share/hf:/data/hf_cache
      - ./data/models:/data/models
    ports:
      - "${LLM_PORT:-8003}:8000"
    networks:
      - rag_net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VLLM_CUDA_DEVICE:-0}", "${VLLM_CUDA_DEVICE1:-1}"]
              capabilities: [gpu]
    shm_size: ${VLLM_SHM_SIZE:-8g}
    restart: unless-stopped
    profiles:
      - with-llm

  # VLM (Vision/Multimodal) vLLM server
  vlm:
    container_name: rag-vlm
    image: vllm/vllm-openai:latest
    command: >
      --model ${MODEL_VLM:-${VLM_MODEL_NAME:-gpt-oss-20b}}
      --port 8000
      --host 0.0.0.0
      --trust-remote-code
      --tensor-parallel-size ${VLM_TP_SIZE:-2}
      --max-model-len ${VLM_MAX_MODEL_LEN:-32768}
      --gpu-memory-utilization ${VLM_GPU_MEM_UTIL:-0.9}
    environment:
      - HF_HOME=/data/hf_cache
      - HUGGINGFACE_HUB_TOKEN=${HUGGINGFACE_HUB_TOKEN:-}
      - CUDA_VISIBLE_DEVICES=${VLM_CUDA_DEVICES:-0}
    volumes:
      - /home/llm-share/hf:/data/hf_cache
      - ./data/models:/data/models
    ports:
      - "${VLM_PORT:-8004}:8000"
    networks:
      - rag_net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VLM_CUDA_DEVICE:-0}", "${VLM_CUDA_DEVICE1:-1}"]
              capabilities: [gpu]
    shm_size: ${VLM_SHM_SIZE:-8g}
    restart: unless-stopped
    profiles:
      - with-vlm

  # TEI (Text Embeddings Inference)
  tei:
    container_name: rag-tei
    image: ghcr.io/huggingface/text-embeddings-inference:${TEI_VERSION:-cpu-1.8}
    command: >
      --model-id ${TEI_MODEL_ID:-intfloat/multilingual-e5-large}
      --port 80
      --max-concurrent-requests ${TEI_MAX_CONCURRENT:-512}
    environment:
      - HF_HOME=/data/hf_cache
      - HUGGINGFACE_HUB_TOKEN=${HUGGINGFACE_HUB_TOKEN:-}
    volumes:
      - /home/llm-share/hf:/data/hf_cache
    networks:
      - rag_net
    restart: unless-stopped
    profiles:
      - with-tei

  # ---------------------------------------------------------------------------
  # Production Services (profile: prod)
  # ---------------------------------------------------------------------------

  api:
    container_name: rag-api
    profiles:
      - prod
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      - HF_HOME=/data/hf_cache
      - TRANSFORMERS_CACHE=/data/hf_cache
      - SEARCH_ES_HOST=http://elasticsearch:9200
      - SEARCH_ES_ENV=dev
    volumes:
      # No source mount for prod (use built image)
      - ./scripts:/app/scripts
      - ./data/ingestions:/data/ingestions
      - ./data/vector_store:/data/vector_store
      - /home/llm-share/hf:/data/hf_cache
      - /home/llm-share/datasets/pe_agent_data:/data/pe_agent_data
      - ./data/logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${API_PORT:-8001}:8000"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - rag_net
    restart: unless-stopped

  frontend:
    container_name: rag-frontend
    profiles:
      - prod
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ""
        VITE_CHAT_PATH: ${VITE_CHAT_PATH:-/api/agent/run}
        VITE_INGESTIONS_BASE: ${VITE_INGESTIONS_BASE:-/data/ingestions}
        VITE_DEFAULT_INGESTION_RUN: ${VITE_DEFAULT_INGESTION_RUN:-}
        VITE_BUILD_TARGET: prod
        API_PROXY_TARGET: http://api:8000
    env_file:
      - .env
    volumes:
      - ./data/ingestions:/data/ingestions
    ports:
      - "${FRONTEND_PORT:-9097}:9097"
    depends_on:
      api:
        condition: service_started
    networks:
      - rag_net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Development Services (profile: dev)
  # ---------------------------------------------------------------------------

  api-dev:
    container_name: rag-api-dev
    profiles:
      - dev
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      - HF_HOME=/data/hf_cache
      - TRANSFORMERS_CACHE=/data/hf_cache
      - SEARCH_ES_HOST=http://elasticsearch:9200
      - SEARCH_ES_ENV=dev
    volumes:
      # Source mount for hot-reload
      - ./backend:/app/backend
      - ./scripts:/app/scripts
      - ./data/ingestions:/data/ingestions
      - ./data/vector_store:/data/vector_store
      - /home/llm-share/hf:/data/hf_cache
      - /home/llm-share/datasets/pe_agent_data:/data/pe_agent_data
      - ./data/logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${API_PORT_DEV:-8011}:8000"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - rag_net
    restart: unless-stopped

  frontend-dev:
    container_name: rag-frontend-dev
    profiles:
      - dev
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ""
        VITE_CHAT_PATH: ${VITE_CHAT_PATH:-/api/agent/run}
        VITE_INGESTIONS_BASE: ${VITE_INGESTIONS_BASE:-/data/ingestions}
        VITE_DEFAULT_INGESTION_RUN: ${VITE_DEFAULT_INGESTION_RUN:-}
        VITE_BUILD_TARGET: dev
        API_PROXY_TARGET: http://api-dev:8000
    env_file:
      - .env
    volumes:
      - ./data/ingestions:/data/ingestions
    ports:
      - "${FRONTEND_PORT_DEV:-9098}:9097"
    depends_on:
      api-dev:
        condition: service_started
    networks:
      - rag_net
    restart: unless-stopped

# =============================================================================
# Networks & Volumes
# =============================================================================

networks:
  rag_net:
    driver: bridge

volumes:
  es_data:
    driver: local
