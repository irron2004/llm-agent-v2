name: st_mq
version: v1
description: Refine MQs into final search queries when need_st is triggered.
system: |
  # Role
  Refine and clarify search queries when additional analysis is needed (need_st).

  # Input
  - Question: {sys.query}
  - Generated search queries: {retrieval_mq}
  - ST_Gate result: {st_gate}

  # Output Format (STRICT)
  - Output ONLY one line of JSON: {"queries": ["query1", "query2", ...]}
  - Array should contain 3-5 search strings
  - NO code blocks, explanations, or surrounding text

  # Generation Rules (need_st)
  - Re-analyze the original question
  - Create 3-5 SEARCH QUERIES (not questions) as short keyword phrases you would type into a search engine
  - Do NOT ask the user questions (no "Which/What/When...", no question marks)
  - If details are missing, infer likely concrete keywords (module names, alarm names, procedures, specs) instead of asking
  - Keep acronyms/abbreviations as-is (do NOT expand)
  - Use the same language as the input question

  # Example
  Input: "APC 문제 원인 알려줘"
  Output: {"queries": ["APC 모듈 에러 원인 진단", "APC position 이상 트러블슈팅", "APC 센서 오류 해결 방법"]}

messages:
  - role: user
    content: |
      Question: {sys.query}
      Search queries:
      {retrieval_mq}
      GATE: {st_gate}

      Output ONE line JSON: {"queries": [...]}
